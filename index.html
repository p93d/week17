<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 17 Matchups</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #a71db9d3;
            --score-color: #11e434;
            --button-bg: #333333;
            --button-hover: #444444;
            --border-color: #555555;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        h1, h2 {
            color: var(--accent-color);
        }

        #question {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .choice-btn {
            padding: 0.75rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--button-bg);
            color: var(--text-color);
            transition: background-color 0.3s ease;
        }

        .choice-btn:hover {
            background-color: var(--button-hover);
        }

        #timer, #score {
            margin: 0.5rem 0;
        }

        #start {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--button-bg);
            color: var(--text-color);
            transition: background-color 0.3s ease;
        }

        #start:hover {
            background-color: var(--button-hover);
        }

        #results {
            margin-top: 2rem;
        }

        #results p {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <h1>Week 17 Matchups</h1>
    <button id="start">Start</button>
    <div id="timer" hidden>Time: <span id="time">0.00</span>s</div>
    <div id="score" hidden>Score: <span id="correct">0</span>/<span id="total">0</span></div>
    <div id="question-area" hidden>
        <div id="question"></div>
        <div class="choices">
           
        </div>
    </div>
    <div id="results" hidden>
        <p style="font-size: 2rem; text-align: center;">Your score: <span id="final-score" style="font-weight: bold; color: var(--score-color);"></span></p>
        <p style="font-size: 1.5rem; text-align: center;">Time: <span id="final-time" style="font-weight: bold; color: var(--score-color);"></span>s</p>
        <button id="restart" style="margin-top: 1rem; padding: 0.75rem 2.5rem; font-size: 1rem; cursor: pointer; border: 1px solid var(--border-color); border-radius: 8px; background-color: #b90de9; color: var(--text-color); transition: background-color 0.3s ease; width: 300px;">Play Again</button>
    </div>

    <script>
        const matchups = [
        { team1: 'BAL', team2: 'CIN', logo1: 'logos/BAL.png', logo2: 'logos/CIN.png' },
        { team1: 'ARI', team2: 'LV', logo1: 'logos/ARI.png', logo2: 'logos/LV.png' },
        { team1: 'ATL', team2: 'NO', logo1: 'logos/ATL.png', logo2: 'logos/NO.png' },
        { team1: 'BUF', team2: 'MIA', logo1: 'logos/BUF.png', logo2: 'logos/MIA.png' },
        { team1: 'CAR', team2: 'SEA', logo1: 'logos/CAR.png', logo2: 'logos/SEA.png' },
        { team1: 'CHI', team2: 'DET', logo1: 'logos/CHI.png', logo2: 'logos/DET.png' },
        { team1: 'CLE', team2: 'IND', logo1: 'logos/CLE.png', logo2: 'logos/IND.png' },
        { team1: 'DAL', team2: 'NYG', logo1: 'logos/DAL.png', logo2: 'logos/NYG.png' },
        { team1: 'DEN', team2: 'NE', logo1: 'logos/DEN.png', logo2: 'logos/NE.png' },
        { team1: 'GB', team2: 'HOU', logo1: 'logos/GB.png', logo2: 'logos/HOU.png' },
        { team1: 'JAX', team2: 'WAS', logo1: 'logos/JAX.png', logo2: 'logos/WAS.png' },
        { team1: 'KC', team2: 'LAC', logo1: 'logos/KC.png', logo2: 'logos/LAC.png' },
        { team1: 'LAR', team2: 'TB', logo1: 'logos/LAR.png', logo2: 'logos/TB.png' },
        { team1: 'MIN', team2: 'NYJ', logo1: 'logos/MIN.png', logo2: 'logos/NYJ.png' },
        { team1: 'PHI', team2: 'SF', logo1: 'logos/PHI.png', logo2: 'logos/SF.png' },
        { team1: 'PIT', team2: 'TEN', logo1: 'logos/PIT.png', logo2: 'logos/TEN.png' }
        ];

        function showNext() {
            if (currentIndex >= shuffled.length) {
            endGame();
            return;
            }
            const correctPair = shuffled[currentIndex];
            const wrongPairs = matchups.filter(m => m !== correctPair);
            shuffle(wrongPairs);
            const choices = [correctPair, wrongPairs[0], wrongPairs[1], wrongPairs[2]];
            shuffle(choices);

            questionEl.innerHTML = `
            <img src="${correctPair.logo1}" alt="${correctPair.team1}" style="width: 100px; height: auto;">
            vs
            <img src="${correctPair.logo2}" alt="${correctPair.team2}" style="width: 100px; height: auto;">
            `;
            choicesContainer.innerHTML = '';
            choices.forEach(pair => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = pair.team2;
            btn.onclick = () => selectAnswer(pair.team2 === correctPair.team2);
            choicesContainer.appendChild(btn);
            });
        }
        let shuffled, currentIndex, correctCount, startTime;

        const startBtn = document.getElementById('start');
        const timerEl = document.getElementById('timer');
        const timeEl = document.getElementById('time');
        const scoreEl = document.getElementById('score');
        const correctEl = document.getElementById('correct');
        const totalEl = document.getElementById('total');
        const questionArea = document.getElementById('question-area');
        const questionEl = document.getElementById('question');
        const choicesContainer = document.querySelector('.choices');
        const results = document.getElementById('results');

        function shuffle(array) {
            return array.sort(() => 0.5 - Math.random());
        }

        function startGame() {
            startBtn.hidden = true;
            timerEl.hidden = false;
            scoreEl.hidden = false;
            questionArea.hidden = false;
            results.hidden = true;

            let correctAnswers = [];
            let incorrectAnswers = [];

            shuffled = shuffle([...matchups]);
            currentIndex = 0;
            correctCount = 0;
            correctEl.textContent = correctCount;
            totalEl.textContent = matchups.length;
            startTime = performance.now();
            updateTimer();
            showNext();
        }

        function updateTimer() {
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
            timeEl.textContent = elapsed;
            requestAnimationFrame(updateTimer);
        }

        

        function showNext() {
            if (currentIndex >= shuffled.length) {
            endGame();
            return;
            }
            const correctPair = shuffled[currentIndex];
            const wrongPairs = matchups.filter(m => m !== correctPair);
            shuffle(wrongPairs);
            const choices = [correctPair, wrongPairs[0], wrongPairs[1], wrongPairs[2]];
            shuffle(choices);

            questionEl.innerHTML = `
            <div style="display: flex; align-items: center; justify-content: center; gap: 1rem;">
            <img src="${correctPair.logo1}" alt="${correctPair.team1}" style="width: 120px; height: auto;">
            <span style="font-size: 1.5rem; font-weight: bold;">vs</span>
            </div>
            `;
            choicesContainer.innerHTML = '';
            choices.forEach(pair => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<img src="${pair.logo2}" alt="${pair.team2}" style="width: 120px; height: auto;">`;
            btn.style.display = 'block'; // Ensure each button is on its own row
            btn.style.padding = '.5rem'; // Increase button padding
            btn.onclick = () => selectAnswer(pair.team2 === correctPair.team2, correctPair);
            choicesContainer.appendChild(btn);
            });
        }

        function selectAnswer(isCorrect, correctPair) {
            if (isCorrect) {
            correctCount++;
            correctAnswers.push(correctPair);
            } else {
            incorrectAnswers.push(correctPair);
            }
            correctEl.textContent = correctCount;
            currentIndex++;
            showNext();
        }

        function endGame() {
            questionArea.hidden = true;
            results.hidden = false;
            const totalTime = ((performance.now() - startTime) / 1000).toFixed(2);
            document.getElementById('final-score').textContent = `${correctCount}/${matchups.length}`;
            document.getElementById('final-time').textContent = totalTime;
            timerEl.hidden = true;
            scoreEl.hidden = true;

            // Create a summary of each matchup
            const summaryContainer = document.createElement('div');
            summaryContainer.style.marginTop = '1rem';
            summaryContainer.style.display = 'grid';
            summaryContainer.style.gridTemplateColumns = '1fr';
            summaryContainer.style.gap = '1rem';

            // Display incorrect answers first
            [...incorrectAnswers, ...correctAnswers].forEach((matchup) => {
            const summaryItem = document.createElement('div');
            summaryItem.style.display = 'flex';
            summaryItem.style.alignItems = 'center';
            summaryItem.style.justifyContent = 'space-between';
            summaryItem.style.border = `4px solid ${incorrectAnswers.includes(matchup) ? 'red' : 'green'}`;
            summaryItem.style.borderRadius = '8px';
            summaryItem.style.padding = '0.5rem';
            summaryItem.style.backgroundColor = 'var(--button-bg)';

            const logos = document.createElement('div');
            logos.style.display = 'flex';
            logos.style.alignItems = 'center';
            logos.style.justifyContent = 'space-between'; 
            logos.style.gap = '1rem';
            logos.style.width = '100%'; 

            const logo1 = document.createElement('img');
            logo1.src = matchup.logo1;
            logo1.alt = matchup.team1;
            logo1.style.width = '60px'; 
            logo1.style.height = 'auto';

            const logo2 = document.createElement('img');
            logo2.src = matchup.logo2;
            logo2.alt = matchup.team2;
            logo2.style.width = '60px'; 
            logo2.style.height = 'auto';

            logos.appendChild(logo1);
            logos.appendChild(logo2);

            summaryItem.appendChild(logos);
            summaryContainer.appendChild(summaryItem);
            });

            results.appendChild(summaryContainer);
        }

    

        startBtn.addEventListener('click', startGame);

        const restartBtn = document.getElementById('restart');
        restartBtn.addEventListener('click', () => {
            results.hidden = true;
            startGame();
        });
    
    </script>
</body>
</html>
